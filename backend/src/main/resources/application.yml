server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: poker-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

poker:
  allowed-origins: ${POKER_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8088}

